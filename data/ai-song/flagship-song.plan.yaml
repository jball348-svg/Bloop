version: 1
id: ai-flagship-song
description: Featured AI-authored song plan for the v17 preset and .bloop asset.
scaffold_id: ai-song-v1
output:
  patch_file: ai-flagship-song.bloop
  blueprint_file: flagship-song.blueprint.json
  report_file: flagship-song.grounding-report.json

intent:
  title: Midnight Circuit
  mood: nocturnal, tensile, melodic
  target_duration_sec: 102.9
  bpm: 112
  global_key:
    root: C
    scale_type: minor
    name: C natural minor
  style_tags:
    - electronic
    - cinematic
    - melodic
    - synthwave-adjacent
  energy_curve:
    - 0.24
    - 0.46
    - 0.84
    - 0.4
    - 0.88
    - 0.3

structure:
  meter:
    numerator: 4
    denominator: 4
  sections:
    - id: intro
      name: Intro
      bars: 8
      energy: 0.24
      density: 0.3
      active_roles:
        - support
        - drums
      automation_lanes:
        - id: song-scene-intro-volume
          targetNodeId: song-mixer
          targetParam: volume
          mode: ramp
          points:
            - [0, 60]
            - [7.75, 67]
        - id: song-scene-intro-space
          targetNodeId: song-support-reverb
          targetParam: wet
          mode: ramp
          points:
            - [0, 0.52]
            - [7.75, 0.78]
    - id: lift
      name: Lift
      bars: 8
      energy: 0.46
      density: 0.48
      active_roles:
        - bass
        - support
        - drums
      automation_lanes:
        - id: song-scene-lift-motion
          targetNodeId: song-support-sampler
          targetParam: playbackRate
          mode: ramp
          points:
            - [0, 0.92]
            - [7.75, 1.06]
        - id: song-scene-lift-bass
          targetNodeId: song-bass-eq
          targetParam: low
          mode: ramp
          points:
            - [0, 2]
            - [7.75, 5]
    - id: arrival
      name: Arrival
      bars: 8
      energy: 0.84
      density: 0.82
      active_roles:
        - bass
        - lead
        - support
        - drums
      automation_lanes:
        - id: song-scene-arrival-delay
          targetNodeId: song-lead-delay
          targetParam: wet
          mode: ramp
          points:
            - [0, 0.24]
            - [7.75, 0.58]
        - id: song-scene-arrival-shift
          targetNodeId: song-support-sampler
          targetParam: pitchShift
          mode: ramp
          points:
            - [0, -2]
            - [7.75, 3]
        - id: song-scene-arrival-air
          targetNodeId: song-drum-eq
          targetParam: high
          mode: ramp
          points:
            - [0, 2]
            - [7.75, 5]
    - id: break
      name: Break
      bars: 8
      energy: 0.4
      density: 0.38
      active_roles:
        - lead
        - support
      automation_lanes:
        - id: song-scene-break-pan
          targetNodeId: song-mixer
          targetParam: pan
          mode: ramp
          points:
            - [0, -0.18]
            - [7.75, 0.14]
        - id: song-scene-break-feedback
          targetNodeId: song-lead-delay
          targetParam: feedback
          mode: ramp
          points:
            - [0, 0.24]
            - [7.75, 0.46]
    - id: return
      name: Return
      bars: 8
      energy: 0.88
      density: 0.88
      active_roles:
        - bass
        - lead
        - support
        - drums
      automation_lanes:
        - id: song-scene-return-volume
          targetNodeId: song-mixer
          targetParam: volume
          mode: ramp
          points:
            - [0, 68]
            - [7.75, 74]
        - id: song-scene-return-delay
          targetNodeId: song-lead-delay
          targetParam: wet
          mode: ramp
          points:
            - [0, 0.5]
            - [7.75, 0.34]
        - id: song-scene-return-motion
          targetNodeId: song-support-sampler
          targetParam: playbackRate
          mode: ramp
          points:
            - [0, 1.08]
            - [7.75, 0.98]
    - id: outro
      name: Outro
      bars: 8
      energy: 0.3
      density: 0.34
      active_roles:
        - bass
        - support
        - drums
      automation_lanes:
        - id: song-scene-outro-space
          targetNodeId: song-support-reverb
          targetParam: wet
          mode: ramp
          points:
            - [0, 0.68]
            - [7.75, 0.92]
        - id: song-scene-outro-fade
          targetNodeId: song-mixer
          targetParam: volume
          mode: ramp
          points:
            - [0, 74]
            - [7.75, 58]
        - id: song-scene-outro-darken
          targetNodeId: song-bass-eq
          targetParam: high
          mode: ramp
          points:
            - [0, -2]
            - [7.75, -8]

harmony:
  section_harmonic_centers:
    intro: tonic
    lift: pedal
    arrival: dominant
    break: ambiguous
    return: dominant
    outro: tonic
  allowed_exception_pitches: []

rhythm:
  subdivision: 16
  swing_policy:
    mode: constant
    ratio: 0.14
  drum_layers:
    - id: kick
      label: Kick
      role: pulse
      length: 16
      sample_path: /ai-song-kit/kick.wav
      steps: [3, 0, 0, 0, 2, 0, 0, 1, 3, 0, 0, 0, 2, 0, 1, 0]
    - id: snare
      label: Snare
      role: accent
      length: 16
      sample_path: /ai-song-kit/snare.wav
      steps: [0, 0, 0, 0, 3, 0, 0, 1, 0, 0, 0, 0, 3, 0, 0, 1]
    - id: hat
      label: Hat
      role: subdivision
      length: 12
      sample_path: /ai-song-kit/hat.wav
      steps: [2, 0, 2, 1, 2, 0, 2, 0, 2, 1, 2, 0, 2, 0, 2, 1]
    - id: clap
      label: Clap
      role: fill
      length: 8
      sample_path: /ai-song-kit/clap.wav
      steps: [0, 0, 1, 0, 0, 0, 2, 0, 0, 0, 1, 0, 0, 0, 2, 0]

arrangement:
  roles:
    bass:
      pattern_node_id: song-bass-pattern
      voice_node_id: song-bass-gen
      register_range:
        low: G1
        high: D#3
      timbre_intent: FM sub-bass with clear attack and a dark controlled tail.
      loop_bars: 8
      notes:
        - [C2, 0, 8, 0.9]
        - [G2, 8, 8, 0.82]
        - [C3, 16, 8, 0.86]
        - [G2, 24, 8, 0.8]
        - [G#1, 32, 8, 0.88]
        - [D#2, 40, 8, 0.8]
        - [G#2, 48, 8, 0.84]
        - [G2, 56, 8, 0.78]
        - [F2, 64, 8, 0.86]
        - [C3, 72, 8, 0.82]
        - [G2, 80, 8, 0.8]
        - [D3, 88, 8, 0.78]
        - [G#1, 96, 8, 0.84]
        - [D#2, 104, 8, 0.8]
        - [G1, 112, 8, 0.86]
        - [G2, 120, 8, 0.78]
    lead:
      pattern_node_id: song-lead-pattern
      voice_node_id: song-lead-gen
      register_range:
        low: C4
        high: D#5
      timbre_intent: Focused AM lead with a vocal-like front edge and delay-borne width.
      loop_bars: 8
      notes:
        - [G4, 0, 4, 0.78]
        - [G#4, 4, 4, 0.74]
        - [C5, 8, 4, 0.84]
        - [D5, 12, 4, 0.8]
        - [C5, 16, 4, 0.76]
        - [G#4, 20, 4, 0.72]
        - [G4, 24, 4, 0.7]
        - [D#4, 28, 4, 0.68]
        - [F4, 32, 4, 0.74]
        - [G4, 36, 4, 0.76]
        - [G#4, 40, 4, 0.74]
        - [C5, 44, 4, 0.82]
        - [G4, 48, 4, 0.76]
        - [D#4, 52, 4, 0.7]
        - [D4, 56, 4, 0.68]
        - [D#4, 60, 4, 0.7]
        - [G4, 64, 4, 0.8]
        - [A#4, 68, 4, 0.76]
        - [C5, 72, 4, 0.84]
        - [D5, 76, 4, 0.82]
        - [D#5, 80, 4, 0.78]
        - [D5, 84, 4, 0.76]
        - [C5, 88, 4, 0.74]
        - [G#4, 92, 4, 0.72]
        - [G4, 96, 4, 0.76]
        - [C5, 100, 4, 0.8]
        - [G#4, 104, 4, 0.74]
        - [G4, 108, 4, 0.72]
        - [D#4, 112, 4, 0.68]
        - [D4, 116, 4, 0.66]
        - [C4, 120, 4, 0.7]
        - [G4, 124, 4, 0.74]
    support:
      pattern_node_id: song-support-pattern
      voice_node_id: song-support-sampler
      register_range:
        low: C4
        high: C4
      timbre_intent: Looped texture cloud that glues sections together and carries the atmospheric arc.
      loop_bars: 8
      notes:
        - [C4, 0, 32, 0.7]
        - [C4, 32, 32, 0.66]
        - [C4, 64, 32, 0.72]
        - [C4, 96, 32, 0.68]
    drums:
      rhythm_node_id: song-drums
      timbre_intent: Punchy electronic drum stack with swung hats, controlled fill energy, and bright arrivals.

sound_design:
  bass:
    generator:
      label: Circuit Bass
      generatorMode: fm
      waveShape: sine
      mix: 80
      harmonicity: 1.28
      modulationIndex: 9.5
    eq:
      eqLow: 4
      eqMid: -2
      eqHigh: -2
      eqLowFrequency: 230
      eqHighFrequency: 2600
  lead:
    quantizer:
      rootNote: C
      scaleType: minor
      bypass: false
    generator:
      label: Neon Lead
      generatorMode: am
      waveShape: triangle
      mix: 74
      harmonicity: 2.45
    delay:
      label: Neon Delay
      subType: delay
      wet: 0.26
      delayTime: 0.38
      feedback: 0.32
  support:
    sampler:
      label: Night Texture
      samplePath: /ai-song-kit/support-texture.wav
      sampleName: support-texture.wav
      loop: true
      playbackRate: 0.96
      pitchShift: -2
      mix: 60
    reverb:
      label: Texture Reverb
      subType: reverb
      wet: 0.64
      roomSize: 0.88
  drums:
    drumNode:
      mix: 80
    eq:
      eqLow: 2
      eqMid: -1
      eqHigh: 3
      eqLowFrequency: 230
      eqHighFrequency: 4900
  mixer:
    volume: 72
    pan: 0
  speaker:
    volume: 70

transforms:
  - id: flagship-bass-quantize
    category: pitch
    operation: quantize_to_scale
    target_role: bass
    applies_to_sections: [lift, arrival, return, outro]
    description: Force the bass line into the C natural minor collection before runtime playback.
    parameters:
      root: C
      scale_type: minor
  - id: flagship-lead-quantize
    category: pitch
    operation: quantize_to_scale
    target_role: lead
    applies_to_sections: [arrival, break, return]
    description: Keep the hook line aligned with the declared key instead of relying on runtime quantization alone.
    parameters:
      root: C
      scale_type: minor
  - id: flagship-support-quantize
    category: pitch
    operation: quantize_to_scale
    target_role: support
    applies_to_sections: [intro, lift, arrival, break, return, outro]
    description: Hold the support bed on tonic material so the texture reinforces form rather than adding harmonic drift.
    parameters:
      root: C
      scale_type: minor
  - id: flagship-groove-swing
    category: time
    operation: apply_swing
    target_role: drums
    applies_to_sections: [intro, lift, arrival, return, outro]
    description: Apply a consistent swung pulse to the drum grid in the sections that carry the full groove.
    parameters:
      ratio: 0.14

evaluation_targets:
  duration_window_sec: [100, 106]
  minimum_role_coverage:
    bass: 4
    lead: 3
    support: 6
    drums: 5
  minimum_automation_lanes: 4
  section_contrast_min: 0.15
  density_curve_target:
    - 0.3
    - 0.48
    - 0.82
    - 0.38
    - 0.88
    - 0.34

revision_notes:
  - The flagship plan now treats C natural minor as a strict compile-time rule rather than a runtime convenience.
  - Previous non-diatonic A and E natural tones in the bass and lead material were corrected to G# and D# equivalents before compilation.
  - The six-section form and roughly 103-second duration were preserved to keep the v17 featured-song shape stable while adding theory grounding.
