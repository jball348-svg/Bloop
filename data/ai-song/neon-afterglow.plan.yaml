version: 1
id: ai-neon-afterglow
description: AI-authored synthwave track plan in F natural minor at 120 BPM with a nocturnal melodic arc and section-driven automation.
scaffold_id: ai-song-v1
output:
  patch_file: ai-neon-afterglow.bloop
  blueprint_file: neon-afterglow.blueprint.json
  report_file: neon-afterglow.grounding-report.json

intent:
  title: Neon Afterglow
  mood: nocturnal, nostalgic, melodic, driving
  target_duration_sec: 88
  bpm: 120
  global_key:
    root: F
    scale_type: minor
    name: F natural minor
  style_tags:
    - electronic
    - synthwave
    - cinematic
    - melodic
    - retro-futurist
  energy_curve:
    - 0.22
    - 0.48
    - 0.82
    - 0.38
    - 0.88

