      name: Intro Fog
      bars: 4
      energy: 0.22
      density: 0.24
      active_roles:
        - support
        - drums
      automation_lanes:
        - id: song-scene-intro-open
          targetNodeId: song-support-reverb
          targetParam: wet
          mode: ramp
          points:
            - [0, 0.58]
            - [3.75, 0.78]
        - id: song-scene-intro-rise
          targetNodeId: song-mixer
          targetParam: volume
          mode: ramp
          points:
